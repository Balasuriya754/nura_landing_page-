

services:
  nura-landing:
    build:
      context: .
      args:
        VITE_API_URL: https://your-backend-domain.com  # 🔥 CHANGE THIS
    container_name: nura-landing
    ports:
      - "3000:3000"
    restart: unless-stopped

    # Optional (not required for Vite, but ok to keep)
    environment:
      - NODE_ENV=production

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s